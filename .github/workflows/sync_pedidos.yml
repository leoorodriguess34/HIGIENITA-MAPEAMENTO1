name: Sincronizar pedidos Tiny em tempo quase real

on:
  schedule:
    # GitHub Actions permite agenda minima pratica de 15 minutos.
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-pedidos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests firebase-admin

      - name: Executar sincronizacao de pedidos
        env:
          TINY_TOKEN: ${{ secrets.TINY_TOKEN }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          SYNC_MODE: pedidos
          TINY_PEDIDOS_DIAS: "30"
          TINY_PEDIDOS_MAX_PAGINAS: "20"
        run: python sync_tiny.py

      - name: Log resultado
        if: always()
        run: echo "Sincronizacao de pedidos finalizada em $(date)"
